services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chat_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chat_password}
      POSTGRES_DB: ${POSTGRES_DB:-chat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chat_user} -d ${POSTGRES_DB:-chat}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    restart: ${RESTART_POLICY:-unless-stopped}

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chat_user}:${POSTGRES_PASSWORD:-chat_password}@postgres:5432/${POSTGRES_DB:-chat}
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://localhost,https://127.0.0.1}
    env_file:
      - ./server/.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const response = await fetch('http://127.0.0.1:3000/healthz'); if (!response.ok) process.exit(1);",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    ports:
      - "${SERVER_BIND:-127.0.0.1}:${SERVER_PORT:-3000}:3000"
    restart: ${RESTART_POLICY:-unless-stopped}

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-/etc/nginx/certs/server.crt}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-/etc/nginx/certs/server.key}
      TLS_ALT_NAMES: ${TLS_ALT_NAMES:-DNS:localhost,IP:127.0.0.1}
    ports:
      - "${CLIENT_HTTP_BIND:-0.0.0.0}:${CLIENT_HTTP_PORT:-80}:80"
      - "${CLIENT_HTTPS_BIND:-0.0.0.0}:${CLIENT_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/certs:/etc/nginx/certs
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: ${RESTART_POLICY:-unless-stopped}

volumes:
  postgres_data:
